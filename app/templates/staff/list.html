<!DOCTYPE html>
<html>
<head>
    <title>Staff Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Staff Management</h1>
    <p>
        <a href="{{ url_for('vehicles_html_bp.list_vehicles') }}">Manage Vehicles</a> |
        <a href="{{ url_for('customers_html_bp.list_customers') }}">Manage Customers</a> |
        <a href="{{ url_for('waste_types_html_bp.list_waste_types') }}">Manage Waste Types</a>
    </p>
    <a href="{{ url_for('staff_html_bp.add_staff_form') }}">Add New Staff Member</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Role</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for member in staff_members %}
            <tr>
                <td>{{ member.id }}</td>
                <td>{{ member.name }}</td>
                <td>{{ member.role }}</td>
                <td>{{ member.contact_email }}</td>
                <td>{{ member.contact_phone }}</td>
                <td>
                    <a href="{{ url_for('staff_html_bp.edit_staff_form', staff_id=member.id) }}">Edit</a>
                    <form action="{{ url_for('staff_html_bp.delete_staff_action', staff_id=member.id) }}" method="post" style="display:inline;">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
