<!DOCTYPE html>
<html>
<head>
    <title>{{ 'Edit' if schedule else 'Add' }} Schedule</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ 'Edit' if schedule else 'Add' }} Schedule</h1>
    {% if error %}
        <p style="color:red;">Error: {{ error }}</p>
    {% endif %}
    <form method="post">
        <div>
            <label for="customer_id">Customer:</label>
            <select id="customer_id" name="customer_id" required>
                {% for customer in customers %}
                <option value="{{ customer.id }}" {{ 'selected' if schedule and schedule.customer_id == customer.id }}>
                    {{ customer.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="waste_type_id">Waste Type:</label>
            <select id="waste_type_id" name="waste_type_id" required>
                {% for waste_type in waste_types %}
                <option value="{{ waste_type.id }}" {{ 'selected' if schedule and schedule.waste_type_id == waste_type.id }}>
                    {{ waste_type.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="scheduled_date">Scheduled Date (YYYY-MM-DD):</label>
            <input type="date" id="scheduled_date" name="scheduled_date"
                   value="{{ schedule.scheduled_date.strftime('%Y-%m-%d') if schedule and schedule.scheduled_date else '' }}" required>
        </div>
        <div>
            <label for="frequency">Frequency:</label>
            <select id="frequency" name="frequency" required>
                <option value="once" {{ 'selected' if schedule and schedule.frequency == 'once' }}>Once</option>
                <option value="daily" {{ 'selected' if schedule and schedule.frequency == 'daily' }}>Daily</option>
                <option value="weekly" {{ 'selected' if schedule and schedule.frequency == 'weekly' }}>Weekly</option>
                <option value="monthly" {{ 'selected' if schedule and schedule.frequency == 'monthly' }}>Monthly</option>
            </select>
        </div>
        <div>
            <label for="vehicle_id">Vehicle (Optional):</label>
            <select id="vehicle_id" name="vehicle_id">
                <option value="">-- Select Vehicle --</option>
                {% for vehicle in vehicles %}
                <option value="{{ vehicle.id }}" {{ 'selected' if schedule and schedule.vehicle_id == vehicle.id }}>
                    {{ vehicle.registration_number }} ({{ vehicle.type }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="staff_id">Staff Member (Optional):</label>
            <select id="staff_id" name="staff_id">
                <option value="">-- Select Staff --</option>
                {% for staff in staff_members %}
                <option value="{{ staff.id }}" {{ 'selected' if schedule and schedule.staff_id == staff.id }}>
                    {{ staff.name }} ({{ staff.role }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="status">Status:</label>
            <select id="status" name="status" required>
                <option value="pending" {{ 'selected' if not schedule or schedule.status == 'pending' }}>Pending</option>
                <option value="assigned" {{ 'selected' if schedule and schedule.status == 'assigned' }}>Assigned</option>
                <option value="completed" {{ 'selected' if schedule and schedule.status == 'completed' }}>Completed</option>
                <option value="cancelled" {{ 'selected' if schedule and schedule.status == 'cancelled' }}>Cancelled</option>
            </select>
        </div>
        <div>
            <label for="notes">Notes (Optional):</label>
            <textarea id="notes" name="notes">{{ schedule.notes if schedule and schedule.notes else '' }}</textarea>
        </div>
        <button type="submit">Save Schedule</button>
    </form>
    <a href="{{ url_for('schedules_html_bp.list_schedules') }}">Back to Schedules List</a>
</body>
</html>
