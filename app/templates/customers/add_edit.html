<!DOCTYPE html>
<html>
<head>
    <title>{{ 'Edit' if customer else 'Add' }} Customer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ 'Edit' if customer else 'Add' }} Customer</h1>
    <form method="post">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ customer.name if customer else '' }}" required>
        </div>
        <div>
            <label for="address">Address:</label>
            <textarea id="address" name="address" required>{{ customer.address if customer else '' }}</textarea>
        </div>
        <div>
            <label for="contact_email">Email:</label>
            <input type="email" id="contact_email" name="contact_email" value="{{ customer.contact_email if customer else '' }}" required>
        </div>
        <div>
            <label for="contact_phone">Phone:</label>
            <input type="tel" id="contact_phone" name="contact_phone" value="{{ customer.contact_phone if customer else '' }}">
        </div>
        <button type="submit">Save</button>
    </form>
    <a href="{{ url_for('customers_html_bp.list_customers') }}">Back to List</a>
</body>
</html>
